<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Typing Speed Racer | VishwaNova 2026</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="../shared/experience-kit.css" />
    <link rel="stylesheet" href="../shared/mobile.css" />
    <link rel="stylesheet" href="../shared/soundkit.css" />
    <style>
      canvas {
        max-width: 100vw !important;
        max-height: 80vh !important;
        object-fit: contain;
      }
      body {
        overflow-x: hidden;
        touch-action: manipulation;
      }
      canvas {
        max-width: 100%;
        height: auto;
      }
    </style>
    <link rel="stylesheet" href="../shared/fx-kit.css" />
  <link rel="stylesheet" href="../shared/engagement-kit.css" />
</head>
  <body>
    <div id="loader">
      <div class="loader-content">
        <p class="loader-text">🏎️ Revving engines...</p>
      </div>
    </div>
    <audio id="bg-audio" loop>
      <source
        src="https://cdn.pixabay.com/audio/2022/03/10/audio_d0a13f69d2.mp3?v=110"
        type="audio/mpeg"
      /></audio
    ><button id="audio-toggle">🎵</button>
    <main id="app">
      <canvas id="race-canvas"></canvas>
      <div id="dashboard">
        <div class="stat"><span>WPM</span><span id="wpm-val">0</span></div>
        <div class="stat">
          <span>Accuracy</span><span id="accuracy-val">100%</span>
        </div>
        <div class="stat"><span>Time</span><span id="time-val">0:00</span></div>
      </div>
      <div id="text-area">
        <p id="text-display"></p>
        <textarea
          id="text-input"
          placeholder="Start typing to race!"
          rows="3"
        ></textarea>
      </div>
      <div id="controls">
        <button id="restart-btn">🔄 New Race</button
        ><select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
    </main>
    <footer class="github-badge">
      <a href="https://github.com/AkshatRock/weboreel-hackathon" target="_blank"
        >⭐ GitHub Repo</a
      ><span>VishwaNova 2026</span>
    </footer>
    <script src="../shared/soundkit.js" defer></script>
    <script src="../shared/experience-kit.js" defer></script>
    <script src="../shared/engagement-kit.js" defer></script>
    <script src="../shared/experience-configs-1-21.js" defer></script>
    <script src="../shared/fx-kit.js" defer></script>
    <script src="script.js"></script>
  
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const parts = location.pathname.split("/").filter(Boolean);
        const slug = parts[parts.length - 2] || "";
        const cfg = window.WeboReelsExperienceConfigs1to21?.[slug] || { title: document.title };
        window.WeboReelsExperienceKit?.init?.(cfg);
      });
    </script>
</body>
</html>
